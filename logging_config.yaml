version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    formatter: default
    stream: ext://sys.stdout
  file:
    class: logging.FileHandler
    formatter: default
    filename: logs/app.log
    encoding: utf-8

root:
  level: INFO
  handlers: [console, file]

loggers:
  uvicorn:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn.error:
    level: INFO
    handlers: [console, file]
    propagate: false
  uvicorn.access:
    level: INFO
    handlers: [console, file]
    propagate: false
  pageindex-ui:
    level: INFO
    propagate: true
  pageindex:
    level: INFO
    propagate: true
  pageindex.vrag:
    level: INFO
    propagate: true
  pageindex.page_index:
    level: INFO
    propagate: true
  LiteLLM:
    level: INFO
    propagate: true
