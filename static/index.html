<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PageIndex | Ingestion Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f1115;
      --surface: rgba(255, 255, 255, 0.05);
      --surface-hover: rgba(255, 255, 255, 0.08);
      --border: rgba(255, 255, 255, 0.1);
      --text: #e2e8f0;
      --text-muted: #94a3b8;
      --accent: #3b82f6;
      --accent-glow: rgba(59, 130, 246, 0.5);
      --success: #10b981;
      --danger: #ef4444;
      --warning: #f59e0b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Outfit', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Ambient background blur */
    body::before {
      content: '';
      position: fixed;
      top: -20%; left: -10%;
      width: 50%; height: 50%;
      background: radial-gradient(circle, var(--accent-glow) 0%, transparent 70%);
      filter: blur(120px);
      z-index: -1;
      opacity: 0.4;
    }

    header {
      padding: 24px 48px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 17, 21, 0.7);
      backdrop-filter: blur(12px);
      position: sticky;
      top: 0;
      z-index: 10;
    }

    h1 { font-weight: 700; font-size: 1.5rem; letter-spacing: -0.02em; }
    h1 span { color: var(--accent); }

    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--text); }

    main {
      padding: 48px;
      max-width: 1400px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: 1fr 3fr;
      gap: 32px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      backdrop-filter: blur(16px);
      box-shadow: 0 4px 24px rgba(0,0,0,0.2);
    }

    h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 16px; color: #fff; }

    /* Controls */
    .btn {
      width: 100%;
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 14px 24px;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 16px var(--accent-glow);
    }

    .btn:disabled {
      background: var(--surface);
      color: var(--text-muted);
      cursor: not-allowed;
      border: 1px solid var(--border);
    }

    .spinner {
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: none;
    }
    .btn.loading .spinner { display: block; }

    /* Drag & Drop */
    .dropzone {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.2s;
      background: rgba(0,0,0,0.2);
    }
    .dropzone:hover, .dropzone.dragover {
      border-color: var(--accent);
      background: rgba(59, 130, 246, 0.05);
    }
    .dropzone p { color: var(--text-muted); font-size: 0.9rem; margin-top: 8px; }

    /* Queue Grid */
    .queue-header {
      display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;
    }
    .queue-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 16px;
    }

    .job-card {
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      transition: all 0.2s;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .job-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
      background: var(--surface-hover);
    }

    .job-id { font-family: monospace; font-size: 0.85rem; color: var(--text-muted); }
    .job-date { font-size: 0.8rem; color: var(--text-muted); margin-top: 4px; }
    
    .badge {
      position: absolute;
      top: 16px; right: 16px;
      padding: 4px 8px;
      border-radius: 12px;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .badge.pending { background: rgba(255,255,255,0.1); color: var(--text); }
    .badge.processing { background: rgba(59,130,246,0.2); color: #60a5fa; }
    .badge.completed { background: rgba(16,185,129,0.2); color: #34d399; }
    .badge.failed { background: rgba(239,68,68,0.2); color: #f87171; }

    .error-msg {
      margin-top: 12px; font-size: 0.8rem; color: #f87171;
      background: rgba(239,68,68,0.1); padding: 8px; border-radius: 6px;
    }

    /* Modal / Tree Viewer */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(8px);
      display: flex; justify-content: flex-end; z-index: 100;
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .modal-overlay.active { opacity: 1; pointer-events: all; }
    
    .modal-panel {
      width: 600px; max-width: 90vw;
      background: var(--bg); border-left: 1px solid var(--border);
      height: 100%; overflow-y: auto;
      transform: translateX(100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
      padding: 32px;
    }
    .modal-overlay.active .modal-panel { transform: translateX(0); }

    .modal-close {
      position: absolute; top: 24px; right: 24px;
      background: none; border: none; color: var(--text-muted); font-size: 1.5rem;
      cursor: pointer;
    }
    .modal-close:hover { color: #fff; }

    .tree ul { list-style: none; padding-left: 20px; border-left: 1px solid var(--border); margin-left: 8px;}
    .tree > ul { padding-left: 0; border-left: none; margin-left: 0; }
    .tree li { margin: 12px 0; position: relative; }
    .tree li::before {
      content: ''; position: absolute; left: -20px; top: 10px; width: 16px; height: 1px; background: var(--border);
    }
    .tree > ul > li::before { display: none; }

    .node-title { font-weight: 600; color: #fff; }
    .node-meta { font-size: 0.8rem; color: var(--accent); margin-left: 8px; }
    .node-ready { font-size: 0.7rem; background: rgba(16,185,129,0.2); color: #34d399; padding: 2px 6px; border-radius: 4px; margin-left: 8px;}
    .node-summary { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; line-height: 1.5; }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 1024px) {
      main { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Page<span>Index</span></h1>
    <div class="nav-links">
      <a href="/usage">Credit Dashboard →</a>
    </div>
  </header>

  <main>
    <!-- Left Sidebar: Controls -->
    <aside>
      <div class="panel">
        <h2>S3 Batch Ingestion</h2>
        <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 24px; line-height: 1.5;">
          Scans the configured S3 bucket for pending documents and processes them concurrently.
        </p>
        <button id="btnBatch" class="btn">
          <div class="spinner"></div>
          <span id="btnBatchText">Run Batch Pipeline</span>
        </button>

        <hr style="border:0; border-top: 1px solid var(--border); margin: 32px 0;">

        <h2>Single Upload</h2>
        <div class="dropzone" id="dropzone">
          <strong style="color: #fff;">Drag & drop PDF</strong>
          <p>or click to browse</p>
          <input type="file" id="fileInput" accept=".pdf" hidden>
        </div>
        <p id="uploadStatus" style="font-size: 0.85rem; margin-top: 12px; color: var(--accent); text-align: center;"></p>
      </div>
    </aside>

    <!-- Right Content: Live Queue -->
    <section>
      <div class="panel" style="min-height: 80vh;">
        <div class="queue-header">
          <h2>Live Ingestion Queue</h2>
          <span style="font-size: 0.85rem; color: var(--text-muted);">Auto-updating...</span>
        </div>
        <div class="queue-grid" id="queueGrid">
          <!-- Cards injected here -->
        </div>
      </div>
    </section>
  </main>

  <!-- Modal for Tree View -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-panel">
      <button class="modal-close" id="modalClose">&times;</button>
      <h2 id="modalTitle" style="margin-bottom: 8px;">Document Structure</h2>
      <p id="modalDocId" style="font-family: monospace; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 32px;"></p>
      <div id="treeView" class="tree"></div>
    </div>
  </div>

  <script>
    // Elements
    const btnBatch = document.getElementById('btnBatch');
    const btnBatchText = document.getElementById('btnBatchText');
    const queueGrid = document.getElementById('queueGrid');
    const dropzone = document.getElementById('dropzone');
    const fileInput = document.getElementById('fileInput');
    const uploadStatus = document.getElementById('uploadStatus');
    const modalOverlay = document.getElementById('modalOverlay');
    const modalClose = document.getElementById('modalClose');
    const treeView = document.getElementById('treeView');
    const modalTitle = document.getElementById('modalTitle');
    const modalDocId = document.getElementById('modalDocId');

    // Trigger Batch
    btnBatch.addEventListener('click', async () => {
      btnBatch.classList.add('loading');
      btnBatchText.textContent = 'Starting...';
      try {
        const res = await fetch('/api/ingestion/ingest/run', { method: 'POST' });
        const data = await res.json();
        if (res.status === 409) alert(data.detail);
      } catch (err) {
        alert("Error starting batch: " + err.message);
      }
      setTimeout(() => {
        btnBatch.classList.remove('loading');
        btnBatchText.textContent = 'Run Batch Pipeline';
      }, 1500);
      fetchJobs();
    });

    // Poll Jobs
    async function fetchJobs() {
      try {
        const res = await fetch('/api/ingestion/jobs');
        if (!res.ok) return;
        const data = await res.json();
        renderQueue(data.jobs || []);
      } catch (e) {
        console.error(e);
      }
    }

    function renderQueue(jobs) {
      if (!jobs.length) {
        queueGrid.innerHTML = '<p style="color:var(--text-muted)">No jobs found in the database.</p>';
        return;
      }
      queueGrid.innerHTML = jobs.map(job => `
        <div class="job-card" onclick="openTree('${job.doc_id}', '${job.status}')">
          <div class="badge ${job.status}">${job.status}</div>
          <div style="font-weight: 600; color: #fff; margin-bottom: 4px;">
            ${job.seq_id != null ? `#${job.seq_id} ` : ''}${escapeHtml(job.file_name || 'Document')}
          </div>
          <div class="job-id">${job.doc_id}</div>
          <div class="job-date">${new Date(job.created_at).toLocaleString()}</div>
          ${job.error_message ? `<div class="error-msg">${escapeHtml(job.error_message)}</div>` : ''}
        </div>
      `).join('');
    }

    // Modal / Tree
    modalClose.addEventListener('click', () => modalOverlay.classList.remove('active'));
    modalOverlay.addEventListener('click', (e) => { if(e.target === modalOverlay) modalOverlay.classList.remove('active'); });

    async function openTree(docId, status) {
      if (status !== 'completed') return;
      modalOverlay.classList.add('active');
      modalDocId.textContent = docId;
      treeView.innerHTML = '<div class="spinner" style="display:block; border-top-color:var(--accent); margin: 20px auto;"></div>';
      
      try {
        const res = await fetch(`/api/ingestion/jobs/${docId}/tree`);
        if (!res.ok) throw new Error('Failed to load tree');
        const data = await res.json();
        treeView.innerHTML = renderTreeHTML(data.structure);
      } catch (e) {
        treeView.innerHTML = `<p style="color:#f87171">${e.message}</p>`;
      }
    }

    function renderTreeHTML(nodes) {
      if (!nodes || !nodes.length) return "<p>No structure.</p>";
      let html = "<ul>";
      for (const node of nodes) {
        html += "<li>";
        html += `<div><span class="node-title">${escapeHtml(node.title || "Untitled")}</span>`;
        if (node.type) html += `<span class="node-meta">${escapeHtml(node.type)}</span>`;
        if (node.retrieval_ready) html += `<span class="node-ready">Ready</span>`;
        html += `</div>`;
        if (node.micro_summary) html += `<div class="node-summary">${escapeHtml(node.micro_summary)}</div>`;
        if (node.nodes && node.nodes.length) html += renderTreeHTML(node.nodes);
        html += "</li>";
      }
      html += "</ul>";
      return html;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }

    // Direct Upload Handler
    dropzone.addEventListener("click", () => fileInput.click());
    dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("dragover"); });
    dropzone.addEventListener("dragleave", () => dropzone.classList.remove("dragover"));
    dropzone.addEventListener("drop", (e) => {
      e.preventDefault(); dropzone.classList.remove("dragover");
      handleUpload(e.dataTransfer.files[0]);
    });
    fileInput.addEventListener("change", () => handleUpload(fileInput.files[0]));

    async function handleUpload(file) {
      if (!file) return;
      uploadStatus.textContent = "Uploading and processing...";
      const formData = new FormData();
      formData.append("file", file);
      try {
        const res = await fetch("/api/process", { method: "POST", body: formData });
        if (!res.ok) throw new Error(`Upload failed (${res.status})`);
        uploadStatus.innerHTML = `<span style="color:var(--success)">Upload successful! Job queued.</span>`;
        fetchJobs();
      } catch (err) {
        uploadStatus.innerHTML = `<span style="color:var(--danger)">${err.message}</span>`;
      }
      setTimeout(() => uploadStatus.textContent = "", 4000);
    }

    // Initial load and poll
    fetchJobs();
    setInterval(fetchJobs, 3000);

  </script>
</body>
</html>
